<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusFlow | Facility Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="gradient-bg">
        <div class="gradient-orb orb1"></div>
        <div class="gradient-orb orb2"></div>
        <div class="gradient-orb orb3"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-calendar-check logo-icon"></i>
                <h1>Campus<span>Flow</span></h1>
            </div>
            <div class="user-menu">
                <div class="user-avatar">
                    <img src="https://ui-avatars.com/api/?name=John+Doe&background=4F46E5&color=fff&bold=true" alt="User">
                </div>
                <div class="user-info">
                    <span class="user-name">John Doe</span>
                    <span class="user-id">ID: 12345</span>
                </div>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="tabs">
            <button class="tab-btn active" onclick="switchTab('facilities')">
                <i class="fas fa-building"></i>
                <span>Facilities</span>
            </button>
            <button class="tab-btn" onclick="switchTab('availability')">
                <i class="fas fa-clock"></i>
                <span>Availability</span>
            </button>
            <button class="tab-btn" onclick="switchTab('bookings')">
                <i class="fas fa-ticket-alt"></i>
                <span>My Bookings</span>
            </button>
        </nav>

        <!-- Main Content -->
        <main class="content">
            <!-- Facilities Tab -->
            <div id="facilities-tab" class="tab-pane active">
                <div class="section-header">
                    <h2>Available Facilities</h2>
                    <p>Browse all campus facilities available for booking</p>
                </div>
                
                <!-- Facility List as Cards -->
                <div class="facilities-grid" id="facilityList">
                    <!-- Facilities will be loaded here as cards -->
                </div>
            </div>

            <!-- Availability Tab -->
            <div id="availability-tab" class="tab-pane">
                <div class="section-header">
                    <h2>Check Availability</h2>
                    <p>Select a facility and date to view available 30-minute time slots</p>
                </div>

                <!-- Booking Form Card -->
                <div class="booking-card">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>
                                <i class="fas fa-building"></i>
                                Select Facility
                            </label>
                            <select id="facilitySelect" class="form-select">
                                <option value="">Choose a facility...</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>
                                <i class="fas fa-calendar"></i>
                                Select Date
                            </label>
                            <input type="date" id="bookingDate" class="form-input">
                        </div>
                        
                        <div class="form-group">
                            <label>&nbsp;</label>
                            <button class="btn-primary" onclick="checkAvailability()">
                                <i class="fas fa-search"></i>
                                Check Slots
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Availability Results Container -->
                <div id="availabilityResult"></div>

                <!-- Create Booking Button (only shown after slot selection) -->
                <div id="createBookingContainer" style="margin-top: 24px; text-align: center; display: none;">
                    <button class="btn-success" onclick="createBooking()" style="padding: 16px 32px;">
                        <i class="fas fa-plus-circle"></i>
                        Create Booking with Selected Slot
                    </button>
                    <p style="margin-top: 8px; color: var(--gray-500); font-size: 13px;">
                        <i class="fas fa-info-circle"></i> Click a green slot above to select it
                    </p>
                </div>
            </div>

            <!-- Bookings Tab -->
            <div id="bookings-tab" class="tab-pane">
                <div class="section-header">
                    <h2>My Bookings</h2>
                    <p>View and manage your facility bookings</p>
                </div>

                <!-- Bookings Grid -->
                <div id="bookingsGrid" class="bookings-grid">
                    <!-- Bookings will be loaded here as cards -->
                </div>
            </div>
        </main>
    </div>

    <!-- Notification Container -->
    <div id="notification" class="notification"></div>

    <script src="/js/app.js"></script>
</body>
</html>
