services:
  - type: web
    name: campus-booking-api
    env: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campus-booking-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: campus-booking-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: campus-booking-db
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: production

databases:
  - name: campus-booking-db
    plan: free
    databaseName: facility_booking_system
    user: campus_booking_user
