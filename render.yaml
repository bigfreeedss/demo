services:
  - type: web
    name: campus-booking-api
    runtime: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: JDBC_DATABASE_URL
        fromDatabase:
          name: campus-booking-db
          property: connectionString
      - key: JDBC_DATABASE_USERNAME
        fromDatabase:
          name: campus-booking-db
          property: user
      - key: JDBC_DATABASE_PASSWORD
        fromDatabase:
          name: campus-booking-db
          property: password

databases:
  - name: campus-booking-db
    plan: free
    databaseName: facility_booking_system
    user: postgres